<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --dark: #1c1c1c; --accent: #f1c40f; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; text-align: center; }
        .header { background: var(--dark); padding: 25px; color: white; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: none; }
        .active { display: block !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <strong>LAM GROUP CONSTRUCTION</strong><br>
        <small id="status" style="color: var(--accent);">СИСТЕМА ЗАГРУЖАЕТСЯ...</small>
    </div>

    <!-- Форма РЕГИСТРАЦИИ -->
    <div id="view-reg" class="card">
        <h3 style="margin-top:0">Регистрация ИТР</h3>
        <input type="text" id="fio" placeholder="Ваше ФИО">
        <input type="tel" id="phone" placeholder="Ваш телефон">
        <button class="btn" onclick="sendData('registration')">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>

    <!-- Форма ОБЪЕКТА -->
    <div id="view-create" class="card">
        <h3 style="margin-top:0">Новый объект</h3>
        <input type="text" id="obj-name" placeholder="Название объекта">
        <input type="text" id="obj-addr" placeholder="Адрес">
        <input type="number" id="obj-sq" placeholder="Площадь м2">
        <button class="btn" onclick="sendData('create_object')">СОЗДАТЬ ОБЪЕКТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');

        if (mode === 'admin') {
            document.getElementById('status').innerText = "РЕЖИМ: АДМИНИСТРАТОР";
            document.getElementById('view-create').classList.add('active');
            document.getElementById('view-reg').style.display = 'none';
        } else {
            document.getElementById('status').innerText = "РЕЖИМ: РЕГИСТРАЦИЯ";
            document.getElementById('view-reg').classList.add('active');
            document.getElementById('view-create').style.display = 'none';
        }

        function sendData(act) {
            let res = { action: act };
            if (act === 'registration') {
                res.fio = document.getElementById('fio').value;
                res.phone = document.getElementById('phone').value;
            } else {
                res.name = document.getElementById('obj-name').value;
                res.addr = document.getElementById('obj-addr').value;
                res.sq = document.getElementById('obj-sq').value;
            }
            tg.sendData(JSON.stringify(res));
            tg.close();
        }
    </script>
</body>
</html>
