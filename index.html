<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --dark: #1c1c1c; --primary: #2481cc; --accent: #f1c40f; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .header { background: var(--dark); padding: 25px; text-align: center; color: white; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo-main { font-weight: 900; font-size: 1.1rem; letter-spacing: 1.5px; }
        .logo-sub { font-size: 0.65rem; color: var(--accent); margin-top: 5px; text-transform: uppercase; }
        
        .container { padding: 20px; display: none; }
        .container.active { display: block; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-main">LAM GROUP CONSTRUCTION</div>
    <div class="logo-sub">Intelligent Building System</div>
</div>

<!-- ЭКРАН РЕГИСТРАЦИИ (ПО УМОЛЧАНИЮ) -->
<div id="view-reg" class="container active">
    <div class="card">
        <h3 style="margin-top:0">Регистрация ИТР</h3>
        <label>ФИО</label>
        <input type="text" id="fio" placeholder="Введите Фамилию и Имя">
        <label>Телефон</label>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
        <button class="btn" onclick="sendReg()">ВОЙТИ В СИСТЕМУ</button>
    </div>
</div>

<!-- ЭКРАН СОЗДАНИЯ ОБЪЕКТА (ОТКРЫВАЕТСЯ ДЛЯ VIP) -->
<div id="view-create" class="container">
    <div class="card">
        <h3 style="margin-top:0">Новый объект</h3>
        <input type="text" id="obj_name" placeholder="Название объекта">
        <input type="text" id="obj_address" placeholder="Адрес">
        <input type="number" id="obj_sq" placeholder="Проектная площадь м2">
        <button class="btn" onclick="sendObj()">СОЗДАТЬ ОБЪЕКТ</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Логика: если в ссылке есть registered=true, показываем создание объекта
    const params = new URLSearchParams(window.location.search);
    if (params.get('registered') === 'true') {
        document.getElementById('view-reg').classList.remove('active');
        document.getElementById('view-create').classList.add('active');
    }

    function sendReg() {
        const fio = document.getElementById('fio').value;
        const phone = document.getElementById('phone').value;
        if(fio.length < 3) return tg.showAlert("Заполните ФИО");
        tg.sendData(JSON.stringify({action: 'registration', fio: fio, phone: phone}));
    }

    function sendObj() {
        const name = document.getElementById('obj_name').value;
        if(name.length < 2) return tg.showAlert("Заполните название");
        tg.sendData(JSON.stringify({action: 'create_full_object', name: name}));
    }
</script>
</body>
</html>
