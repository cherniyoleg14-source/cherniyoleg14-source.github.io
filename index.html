<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        :root { --dark: #1c1c1c; --accent: #f1c40f; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; text-align: center; }
        .header { background: var(--dark); padding: 25px; color: white; border-radius: 0 0 20px 20px; }
        .logo-main { font-weight: 900; font-size: 1.1rem; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; }
        .active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-main">LAM GROUP CONSTRUCTION</div>
        <div style="font-size: 0.7rem; color: var(--accent);">INTELLIGENT SYSTEM</div>
    </div>

    <!-- Регистрация (для новых) -->
    <div id="view-reg" class="card">
        <h3>Регистрация</h3>
        <input type="text" id="fio" placeholder="ФИО">
        <button class="btn" onclick="send('reg')">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>

    <!-- Создание (для Руководителя и ИТР) -->
    <div id="view-create" class="card">
        <h3 id="title-mode">Новый объект</h3>
        <input type="text" id="obj-name" placeholder="Название объекта">
        <input type="text" id="obj-addr" placeholder="Адрес">
        <input type="number" id="obj-sq" placeholder="Площадь м2">
        <button class="btn" onclick="send('obj')">СОЗДАТЬ ОБЪЕКТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const params = new URLSearchParams(window.location.search);
        const regMode = params.get('reg'); // 1 - Рук, 2 - ИТР

        if (regMode === '1' || regMode === '2') {
            document.getElementById('view-create').classList.add('active');
            if(regMode === '2') document.getElementById('title-mode').innerText = "Отчет объекта";
        } else {
            document.getElementById('view-reg').classList.add('active');
        }

        function send(type) {
            let data = { action: type };
            if(type === 'obj') {
                data.name = document.getElementById('obj-name').value;
                data.addr = document.getElementById('obj-addr').value;
                data.sq = document.getElementById('obj-sq').value;
            }
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
