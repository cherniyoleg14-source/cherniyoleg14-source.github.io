<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; margin: 0; padding: 0; text-align: center; }
        .header { background: #1c1c1c; padding: 25px; color: white; border-radius: 0 0 20px 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #1c1c1c; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <strong>LAM GROUP CONSTRUCTION</strong><br>
        <small style="color: #f1c40f;">INTELLIGENT SYSTEM</small>
    </div>

    <!-- БЛОК 1: ДЛЯ ИТР (Виден всегда) -->
    <div id="view-reg" class="card">
        <h3>Регистрация сотрудника</h3>
        <input type="text" id="fio" placeholder="Ваше ФИО">
        <input type="tel" id="phone" placeholder="Телефон">
        <button class="btn" onclick="sendData('registration')">ОТПРАВИТЬ ДАННЫЕ</button>
    </div>

    <!-- БЛОК 2: ДЛЯ РУКОВОДИТЕЛЯ (По умолчанию скрыт, но включается меткой) -->
    <div id="view-create" class="card hidden">
        <h3>Новый объект</h3>
        <input type="text" id="obj-name" placeholder="Название объекта">
        <input type="text" id="obj-addr" placeholder="Адрес">
        <button class="btn" onclick="sendData('create_full_object')">СОЗДАТЬ ОБЪЕКТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Простейшая проверка: если в ссылке есть reg=1, показываем форму объекта
        if (window.location.search.includes('reg=1')) {
            document.getElementById('view-reg').style.display = 'none';
            document.getElementById('view-create').classList.remove('hidden');
        }

        function sendData(action) {
            let result = { action: action };
            if (action === 'registration') {
                result.fio = document.getElementById('fio').value;
                result.phone = document.getElementById('phone').value;
            } else {
                result.name = document.getElementById('obj-name').value;
                result.addr = document.getElementById('obj-addr').value;
            }

            if (!result.fio && !result.name) {
                alert("Заполните поля!");
                return;
            }

            tg.sendData(JSON.stringify(result));
            tg.close();
        }
    </script>
</body>
</html>
