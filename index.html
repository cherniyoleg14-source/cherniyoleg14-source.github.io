<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        select, input, button { padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #0088cc; color: white; border: none; cursor: pointer; }
    </script>
</head>
<body>
    <h3>Отчет по объекту</h3>
    
    <label>Объект:</label>
    <select id="projectSelect"></select>

    <label>Оси/Место:</label>
    <input type="text" id="axisInput" placeholder="Напр: А-Б / 1-3">

    <label>Объем (м²):</label>
    <input type="number" id="volumeInput" placeholder="0.00">

    <button id="sendBtn">Отправить данные</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // 1. Получаем список проектов из URL (который бот прислал в ссылке)
        const urlParams = new URLSearchParams(window.location.search);
        const projectsStr = urlParams.get('projects') || "";
        const projects = projectsStr.split(',');

        const select = document.getElementById('projectSelect');
        projects.forEach(p => {
            if(p) {
                let opt = document.createElement('option');
                opt.value = p;
                opt.innerHTML = p;
                select.appendChild(opt);
            }
        });

        // 2. Логика отправки данных в бот
        document.getElementById('sendBtn').addEventListener('click', () => {
            const data = {
                project: select.value,
                axis: document.getElementById('axisInput').value,
                volume: document.getElementById('volumeInput').value
            };

            if (!data.axis || !data.volume) {
                alert("Пожалуйста, заполните все поля!");
                return;
            }

            // ЭТА СТРОЧКА ОТПРАВЛЯЕТ ДАННЫЕ В БОТ
            tg.sendData(JSON.stringify(data));
            tg.close(); // Закрыть Web App после отправки
        });
    </script>
</body>
</html>
