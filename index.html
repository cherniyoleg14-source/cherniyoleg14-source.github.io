<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --dark: #1c1c1c; --primary: #2481cc; --accent: #f1c40f; --bg: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { background: var(--dark); width: 100%; padding: 40px 0; text-align: center; color: white; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .logo-main { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
        .logo-sub { font-size: 0.7rem; color: var(--accent); letter-spacing: 1px; margin-top: 5px; text-transform: uppercase; }
        .card { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); box-sizing: border-box; margin-top: -20px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #dfe6e9; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #f9f9f9; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(36, 129, 204, 0.1); }
        .btn-reg { background: var(--dark); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-reg:active { transform: scale(0.98); background: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-main">LAM GROUP CONSTRUCTION</div>
        <div class="logo-sub">Intelligent Building System</div>
    </div>
    <div class="card">
        <h2 style="margin-top:0; font-size: 1.2rem; color: var(--dark);">Регистрация ИТР</h2>
        <input type="text" id="fio" placeholder="Фамилия Имя Отчество">
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
        <button class="btn-reg" onclick="register()">Войти в систему</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function register() {
            const fio = document.getElementById('fio').value;
            const phone = document.getElementById('phone').value;
            if (fio.length < 5 || phone.length < 10) {
                tg.showAlert("Заполните данные корректно");
                return;
            }
            tg.sendData(JSON.stringify({
                action: 'registration',
                fio: fio,
                phone: phone,
                user_id: tg.initDataUnsafe.user.id
            }));
        }
    </script>
</body>
</html>
