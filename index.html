<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #555; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Отчет со стройплощадки</h3>
    
    <label>Объект:</label>
    <select id="project_select"></select>
    <!-- Резервное поле, если список пуст -->
    <input type="text" id="project_manual" placeholder="Имя объекта (если нет в списке)" style="display:none;">

    <label>Ось / Отметка:</label>
    <input type="text" id="axis" placeholder="Например: А-Б, 1-5 эт">

    <label>Объем (м²):</label>
    <input type="number" id="volume" placeholder="Введите число">

    <button id="main_button">ОТПРАВИТЬ ОТЧЕТ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Заполняем список объектов из ссылки
        const params = new URLSearchParams(window.location.search);
        const projectsParam = params.get('projects');
        const select = document.getElementById('project_select');
        const manualInput = document.getElementById('project_manual');

        if (projectsParam && projectsParam !== "") {
            const projects = projectsParam.split(',');
            projects.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p; opt.innerHTML = p;
                select.appendChild(opt);
            });
        } else {
            select.style.display = 'none';
            manualInput.style.display = 'block';
        }

        document.getElementById('main_button').addEventListener('click', () => {
            let proj = select.style.display === 'none' ? manualInput.value : select.value;
            let axis = document.getElementById('axis').value;
            let vol = document.getElementById('volume').value;

            if(!proj || !axis || !vol) {
                alert("Пожалуйста, заполните все поля!");
                return;
            }

            let data = { project: proj, axis: axis, volume: vol };
            tg.sendData(JSON.stringify(data)); // Отправка данных боту
        });
    </script>
</body>
</html>
