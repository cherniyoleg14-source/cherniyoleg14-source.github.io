<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --dark: #1c1c1c; --accent: #f1c40f; --bg: #f4f7f9; --primary: #2481cc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--dark); padding: 20px; color: white; text-align: center; border-radius: 0 0 20px 20px; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block !important; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 10px; cursor: pointer; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <strong>LAM GROUP CONSTRUCTION</strong><br>
    <small style="color:var(--accent)">INTELLIGENT BUILDING SYSTEM</small>
</div>

<!-- Вкладка ОБЪЕКТЫ -->
<div id="tab-objects" class="tab-content active">
    <h3 style="margin-top:0">🏗 Мои Объекты</h3>
    <div id="objects-list">
        <p style="text-align:center; color:#999">Загрузка данных...</p>
    </div>
</div>

<!-- Вкладка СОЗДАТЬ -->
<div id="tab-create" class="tab-content">
    <h3 style="margin-top:0">➕ Новый объект</h3>
    <div class="card">
        <input type="text" id="obj-name" placeholder="Название объекта">
        <input type="text" id="obj-addr" placeholder="Адрес">
        <input type="number" id="obj-sq" placeholder="Площадь м2">
        <button class="btn" onclick="sendData()">СОЗДАТЬ КАРТОЧКУ</button>
    </div>
</div>

<!-- Вкладка ФИНАНСЫ -->
<div id="tab-finance" class="tab-content">
    <h3 style="margin-top:0">💰 Финансы</h3>
    <div class="card">
        <p style="font-size:14px; color:#666">Общая аналитика по выплатам:</p>
        <h2 style="margin:10px 0">0 ₸</h2>
        <button class="btn" style="background:#27ae60">СКАЧАТЬ PDF ОТЧЕТ</button>
    </div>
</div>

<div class="nav">
    <div class="nav-item active-nav" onclick="showTab('objects', this)"><i class="fa fa-city"></i>ОБЪЕКТЫ</div>
    <div class="nav-item" onclick="showTab('create', this)"><i class="fa fa-plus-circle"></i>СОЗДАТЬ</div>
    <div class="nav-item" onclick="showTab('finance', this)"><i class="fa fa-wallet"></i>ФИНАНСЫ</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Загрузка объектов из URL
    const params = new URLSearchParams(window.location.search);
    const projectsStr = params.get('projects');
    const container = document.getElementById('objects-list');

    if (projectsStr) {
        container.innerHTML = '';
        projectsStr.split(',').forEach(name => {
            container.innerHTML += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <strong>${name}</strong>
                        <span style="font-size:10px; color:green; background:#e8f5e9; padding:4px 8px; border-radius:10px">В РАБОТЕ</span>
                    </div>
                    <div style="margin-top:10px; height:6px; background:#eee; border-radius:3px">
                        <div style="width:30%; height:100%; background:var(--primary); border-radius:3px"></div>
                    </div>
                </div>`;
        });
    } else {
        container.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">Пока нет созданных объектов</p>';
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        tg.HapticFeedback.impactOccurred('light');
    }

    function sendData() {
        const name = document.getElementById('obj-name').value;
        const addr = document.getElementById('obj-addr').value;
        const sq = document.getElementById('obj-sq').value;
        if(!name) return tg.showAlert("Введите название объекта");
        tg.sendData(JSON.stringify({ action: 'obj', name: name, addr: addr, sq: sq }));
    }
</script>
</body>
</html>
