<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --dark: #1c1c1c; --accent: #f1c40f; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; text-align: center; }
        .header { background: var(--dark); padding: 20px; color: white; border-radius: 0 0 20px 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: none; }
        .active { display: block !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <strong>LAM GROUP CONSTRUCTION</strong><br>
        <small id="debug-mode" style="color: var(--accent);">INITIALIZING...</small>
    </div>

    <div id="view-reg" class="card">
        <h3>Регистрация ИТР</h3>
        <input type="text" id="fio" placeholder="Ваше ФИО">
        <input type="tel" id="phone" placeholder="Ваш телефон">
        <button class="btn" onclick="send('registration')">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>

    <div id="view-create" class="card">
        <h3>Новый объект</h3>
        <input type="text" id="obj-name" placeholder="Название объекта">
        <input type="text" id="obj-addr" placeholder="Адрес">
        <input type="number" id="obj-sq" placeholder="Площадь м2">
        <button class="btn" onclick="send('create_object')">СОЗДАТЬ ОБЪЕКТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('reg');
        document.getElementById('debug-mode').innerText = "MODE: " + mode;

        if (mode === '1') {
            document.getElementById('view-create').classList.add('active');
            document.getElementById('view-reg').style.display = 'none';
        } else {
            document.getElementById('view-reg').classList.add('active');
            document.getElementById('view-create').style.display = 'none';
        }

        function send(act) {
            let data = { action: act };
            if (act === 'registration') {
                data.fio = document.getElementById('fio').value;
                data.phone = document.getElementById('phone').value;
            } else {
                data.name = document.getElementById('obj-name').value;
                data.addr = document.getElementById('obj-addr').value;
                data.sq = document.getElementById('obj-sq').value;
            }
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
