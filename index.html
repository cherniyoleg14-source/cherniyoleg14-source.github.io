<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --dark: #1c1c1c; --accent: #f1c40f; --bg: #f4f7f9; --primary: #2481cc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--dark); padding: 20px; color: white; text-align: center; border-radius: 0 0 20px 20px; }
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block !important; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-submit { background: #27ae60; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; width: 100%; }
        .block-card { border: 1px dashed var(--primary); padding: 10px; border-radius: 10px; margin-top: 10px; background: #fcfcfc; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 10px; cursor: pointer; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <strong>LAM GROUP CONSTRUCTION</strong><br>
    <small style="color:var(--accent)">IBS INTELLIGENT SYSTEM</small>
</div>

<!-- ВКЛАДКА ОБЪЕКТЫ -->
<div id="tab-objects" class="tab-content active">
    <h3 style="margin-top:0">🏗 Текущие объекты</h3>
    <div id="objects-list">
        <!-- Сюда подгрузятся данные из URL -->
    </div>
</div>

<!-- ВКЛАДКА СОЗДАНИЯ -->
<div id="tab-create" class="tab-content">
    <h3 style="margin-top:0">➕ Создание объекта</h3>
    <div class="card">
        <label>Название объекта *</label>
        <input type="text" id="name" placeholder="Напр: ЖК Кристалл">
        <label>Адрес объекта *</label>
        <input type="text" id="addr" placeholder="Улица, дом">
        <label>Ссылка 2ГИС *</label>
        <input type="text" id="gis" placeholder="https://2gis.kz...">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>План м2</label><input type="number" id="sq_p"></div>
            <div style="flex:1"><label>Факт м2</label><input type="number" id="sq_f"></div>
        </div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Дата начала</label><input type="date" id="start"></div>
            <div style="flex:1"><label>Дата окончания</label><input type="date" id="end"></div>
        </div>
        <label>Количество блоков</label>
        <select id="blocks_count" onchange="updateBlockFields()">
            <option value="1">1 Блок</option><option value="2">2 Блока</option><option value="3">3 Блока</option>
            <option value="5">5 Блоков</option><option value="10">10 Блоков</option>
        </select>
        <div id="blocks-container"></div>
        <button class="btn-submit" onclick="submitProject()">СОЗДАТЬ КАРТОЧКУ ОБЪЕКТА</button>
    </div>
</div>

<div class="nav">
    <div class="nav-item active-nav" onclick="showTab('objects', this)"><i class="fa fa-city"></i>ОБЪЕКТЫ</div>
    <div class="nav-item" onclick="showTab('create', this)"><i class="fa fa-plus-circle"></i>СОЗДАТЬ</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Загрузка списка объектов из параметров URL
    const params = new URLSearchParams(window.location.search);
    const projectsStr = params.get('projects');
    const container = document.getElementById('objects-list');

    if (projectsStr) {
        projectsStr.split(',').forEach(name => {
            container.innerHTML += `<div class="card"><strong>${name}</strong><br><small style="color:green">● В работе</small></div>`;
        });
    } else {
        container.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">Пока нет созданных объектов</p>';
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        tg.HapticFeedback.impactOccurred('light');
    }

    function updateBlockFields() {
        const count = document.getElementById('blocks_count').value;
        const container = document.getElementById('blocks-container');
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            container.innerHTML += `
                <div class="block-card">
                    <span style="font-size:10px; color:var(--primary)">БЛОК ${i}</span>
                    <input type="text" class="b-axis" placeholder="Оси (А-Б)">
                    <input type="text" class="b-floors" placeholder="Этажи (1-10)">
                </div>`;
        }
    }
    updateBlockFields();

    function submitProject() {
        const name = document.getElementById('name').value;
        const addr = document.getElementById('addr').value;

        if(!name || !addr) return tg.showAlert("Заполните Название и Адрес!");

        const blocksData = [];
        document.querySelectorAll('.block-card').forEach((card, index) => {
            const inputs = card.querySelectorAll('input');
            blocksData.push({
                num: index + 1,
                axis: inputs[0].value,
                floors: inputs[1].value
            });
        });

        const payload = {
            action: 'create_full_project',
            name: name,
            addr: addr,
            gis: document.getElementById('gis').value,
            sq_p: document.getElementById('sq_p').value,
            sq_f: document.getElementById('sq_f').value,
            start: document.getElementById('start').value,
            end: document.getElementById('end').value,
            blocks: blocksData
        };

        tg.sendData(JSON.stringify(payload));
        tg.close();
    }
</script>
</body>
</html>
